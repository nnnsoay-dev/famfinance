<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貸款與負債總覽小工具</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ms: {
                            blue: '#0078D4',
                            darkBlue: '#005A9E',
                            lightBlue: '#EFF6FC',
                            gray: '#F3F2F1',
                            text: '#323130',
                            textSecondary: '#605E5C',
                            border: '#EDEBE9',
                            bg: '#FAF9F8',
                            danger: '#D13438'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('zh-TW', {
                style: 'currency',
                currency: 'TWD',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(amount || 0);
        };

        const Icon = ({ name, className, wrapperClass = "inline-flex items-center justify-center" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                    lucide.createIcons({ root: spanRef.current });
                }
            }, [name, className]);
            return <span ref={spanRef} className={wrapperClass}></span>;
        };

        const DebtCard = ({ item, updateItem, onViewDetails }) => {
            const { id, title, icon, description, amount, passedYears, totalYears, cash, invested } = item;
            const progressPercent = totalYears > 0 ? Math.min((passedYears / totalYears) * 100, 100) : 0;

            const handleDrag = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
                const percentage = x / rect.width;
                const newPassedYears = Math.round(percentage * totalYears * 10) / 10;
                updateItem(id, 'passedYears', newPassedYears);
            };

            return (
                <div className="bg-white rounded-lg shadow-sm border-t-4 border-t-ms-danger border-x border-b border-x-ms-border border-b-ms-border p-5 hover:shadow-md transition-shadow relative overflow-hidden group">
                    <div className="flex items-start justify-between mb-4">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-ms-bg flex items-center justify-center">
                                <Icon name={icon} className="w-6 h-6 text-ms-blue" />
                            </div>
                            <div>
                                <h3 className="text-lg font-semibold text-ms-text leading-tight">{title}</h3>
                                <p className="text-xs text-ms-textSecondary mt-1">{description}</p>
                            </div>
                        </div>
                    </div>

                    <div className="mb-4">
                        <div className="text-xs text-ms-textSecondary mb-1 flex items-center gap-1">
                            待繳餘額
                        </div>
                        <input 
                            type="number" 
                            value={amount}
                            onChange={(e) => updateItem(id, 'amount', Number(e.target.value))}
                            className="text-2xl font-bold text-ms-danger bg-transparent outline-none w-full border-b border-transparent hover:border-gray-200 focus:border-ms-blue transition-colors"
                        />
                    </div>

                    {(cash !== undefined || invested !== undefined) && (
                        <div className="flex gap-2 mt-2 mb-4">
                            {cash !== undefined && (
                                <div className="flex-1 bg-blue-50 text-ms-blue text-xs p-2 rounded border border-blue-100 flex items-center justify-between">
                                    <span className="flex items-center gap-1"><Icon name="wallet" className="w-3 h-3" /> 活存</span>
                                    <span className="font-semibold">{formatCurrency(cash)}</span>
                                </div>
                            )}
                            {invested !== undefined && (
                                <div className="flex-1 bg-emerald-50 text-emerald-600 text-xs p-2 rounded border border-emerald-100 flex items-center justify-between">
                                    <span className="flex items-center gap-1"><Icon name="trending-up" className="w-3 h-3" /> 基金</span>
                                    <span className="font-semibold">{formatCurrency(invested)}</span>
                                </div>
                            )}
                        </div>
                    )}

                    <div className="mt-4 pt-4 border-t border-gray-100">
                        <div className="flex justify-between text-xs text-ms-textSecondary mb-2">
                            <div className="flex items-center gap-1">已繳 <input type="number" value={passedYears} onChange={(e) => updateItem(id, 'passedYears', Number(e.target.value))} className="w-10 text-center border-b border-gray-300 focus:border-ms-blue outline-none" /> 年</div>
                            <div className="flex items-center gap-1">總共 <input type="number" value={totalYears} onChange={(e) => updateItem(id, 'totalYears', Number(e.target.value))} className="w-10 text-center border-b border-gray-300 focus:border-ms-blue outline-none" /> 年</div>
                        </div>
                        <div className="w-full bg-ms-gray rounded-full h-2.5 cursor-pointer relative" onClick={handleDrag}>
                            <div className="bg-ms-blue h-2.5 rounded-full transition-all duration-300 pointer-events-none" style={{ width: `${progressPercent}%` }}></div>
                        </div>
                    </div>

                    <button 
                        onClick={() => onViewDetails(id)}
                        className="mt-4 w-full py-2 bg-ms-bg hover:bg-gray-200 text-ms-textSecondary hover:text-ms-text text-sm font-medium rounded-md transition-colors flex items-center justify-center gap-2 border border-ms-border"
                    >
                        <Icon name="list" className="w-4 h-4" />
                        紀錄與資金流向
                    </button>
                </div>
            );
        };

        const DebtDetailModal = ({ debt, onClose, onAddRecord, onUpdateBalance }) => {
            const [recordType, setRecordType] = useState('repayment');
            const [newDate, setNewDate] = useState(new Date().toISOString().split('T')[0]);
            const [newAmount, setNewAmount] = useState('');
            const [newPrincipal, setNewPrincipal] = useState('');
            const [newInterest, setNewInterest] = useState('');
            const [newRate, setNewRate] = useState('');
            const [newNote, setNewNote] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                let record = { id: Date.now().toString(), date: newDate, type: recordType, note: newNote };
                if (recordType === 'repayment') {
                    if (!newPrincipal || isNaN(newPrincipal)) return;
                    record.principal = Number(newPrincipal);
                    record.interest = newInterest ? Number(newInterest) : 0;
                    record.rate = newRate ? Number(newRate) : 0;
                    if (!newNote) record.note = '一般繳款';
                } else {
                    if (!newAmount || isNaN(newAmount)) return;
                    record.amount = Number(newAmount);
                    if (!newNote) record.note = recordType === 'invest' ? '買入基金' : '活存利息收入';
                }
                onAddRecord(debt.id, record);
                setNewAmount(''); setNewPrincipal(''); setNewInterest(''); setNewRate(''); setNewNote('');
            };

            const promptUpdate = (field, currentVal, title) => {
                const newVal = prompt(`手動校正 - 請輸入新的「${title}」金額：`, currentVal);
                if (newVal !== null && newVal !== '' && !isNaN(newVal)) onUpdateBalance(debt.id, field, Number(newVal));
            };

            return (
                <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 animate-fade-in backdrop-blur-sm">
                    <div className="bg-white rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                        <div className="flex justify-between items-center p-4 border-b border-ms-border bg-ms-bg">
                            <div className="flex items-center gap-2"><Icon name={debt.icon} className="w-5 h-5 text-ms-blue" /><h2 className="text-lg font-semibold text-ms-text">{debt.title} - 明細紀錄</h2></div>
                            <button onClick={onClose} className="p-1 hover:bg-gray-200 rounded text-ms-textSecondary transition-colors"><Icon name="x" className="w-5 h-5" /></button>
                        </div>
                        <div className="grid grid-cols-3 bg-white border-b border-ms-border">
                            <div className="p-4 text-center border-r border-gray-100"><div className="text-xs text-ms-textSecondary mb-1 flex justify-center items-center gap-1">待償餘額 <button onClick={() => promptUpdate('amount', debt.amount, '待償餘額')} className="hover:bg-gray-100 p-0.5 rounded text-gray-400"><Icon name="edit-2" className="w-3 h-3" /></button></div><div className="font-semibold text-lg text-ms-danger">{formatCurrency(debt.amount)}</div></div>
                            <div className="p-4 text-center border-r border-gray-100 bg-blue-50/30"><div className="text-xs text-ms-textSecondary mb-1 flex justify-center items-center gap-1">活存餘額 <button onClick={() => promptUpdate('cash', debt.cash || 0, '活存餘額')} className="hover:bg-blue-100 p-0.5 rounded text-blue-400"><Icon name="edit-2" className="w-3 h-3" /></button></div><div className="font-semibold text-lg text-ms-blue">{formatCurrency(debt.cash || 0)}</div></div>
                            <div className="p-4 text-center bg-emerald-50/30"><div className="text-xs text-ms-textSecondary mb-1 flex justify-center items-center gap-1">基金投資 <button onClick={() => promptUpdate('invested', debt.invested || 0, '基金投資')} className="hover:bg-emerald-100 p-0.5 rounded text-emerald-500"><Icon name="edit-2" className="w-3 h-3" /></button></div><div className="font-semibold text-lg text-emerald-600">{formatCurrency(debt.invested || 0)}</div></div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 bg-gray-50 space-y-3">
                            {debt.history?.map(record => (
                                <div key={record.id} className="bg-white p-3 rounded-md border border-ms-border shadow-sm relative overflow-hidden">
                                    <div className={`absolute left-0 top-0 bottom-0 w-1 ${record.type === 'invest' ? 'bg-emerald-500' : record.type === 'interest' ? 'bg-blue-500' : 'bg-ms-danger'}`}></div>
                                    <div className="flex justify-between items-start pl-2">
                                        <div><div className="text-xs text-ms-textSecondary mb-1">{record.date}</div><div className="text-sm font-medium text-ms-text">{record.note}</div></div>
                                        <div className="text-right">
                                            <div className="text-sm font-semibold text-ms-danger">{formatCurrency(record.principal || record.amount)}</div>
                                            <div className="text-[10px] text-ms-textSecondary mt-0.5">{record.type === 'invest' ? '活存 → 基金' : record.type === 'interest' ? '活存增加' : '本金減少'}</div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-4 border-t border-ms-border bg-white">
                             <form onSubmit={handleSubmit} className="flex flex-col gap-3">
                                <div className="flex gap-2">
                                    <select value={recordType} onChange={e => setRecordType(e.target.value)} className="text-sm border border-gray-300 rounded p-2 outline-none bg-gray-50"><option value="repayment">🔴 繳還本金</option><option value="invest">🟢 買基金</option><option value="interest">🔵 利息收入</option></select>
                                    <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} className="text-sm border border-ms-border rounded p-2 focus:ring-1 focus:ring-ms-blue outline-none flex-1" required />
                                </div>
                                <div className="flex gap-2">
                                    <input type="number" step="any" value={recordType === 'repayment' ? newPrincipal : newAmount} onChange={e => recordType === 'repayment' ? setNewPrincipal(e.target.value) : setNewAmount(e.target.value)} placeholder="金額" className="flex-1 text-sm border border-ms-border rounded p-2 focus:ring-1 focus:ring-ms-blue outline-none" required />
                                    <button type="submit" className="bg-ms-blue hover:bg-ms-darkBlue text-white px-4 rounded text-sm transition-colors">確認新增</button>
                                </div>
                             </form>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('institutions');
            const [selectedDebtId, setSelectedDebtId] = useState(null);
            const [debts, setDebts] = useState({
                yangxinPublic: { id: 'yangxinPublic', title: '陽信公帳', description: '600萬 + 400萬', amount: 10000000, passedYears: 2, totalYears: 20, icon: 'landmark', tab: 'institutions', bank: '陽信商業銀行', history: [] },
                nonghuiPublic: { id: 'nonghuiPublic', title: '五甲農會公帳', description: '250萬 + 150萬', amount: 4000000, passedYears: 3, totalYears: 15, icon: 'piggy-bank', tab: 'institutions', bank: '五甲農會', history: [] },
                yangxinDianZhai: { id: 'yangxinDianZhai', title: '陽信典宅', description: '房貸/不動產抵押', amount: 8825507, passedYears: 5, totalYears: 30, icon: 'home', tab: 'institutions', bank: '陽信商業銀行', history: [] },
                jianWenRang: { id: 'jianWenRang', title: '簡文讓', description: '已扣除手續費一萬及帳戶管理費三千', amount: 9987000, passedYears: 1, totalYears: 10, icon: 'user', tab: 'institutions', bank: '陽信商業銀行', history: [], cash: 9987000, invested: 0 },
                jianWenRangTax: { id: 'jianWenRangTax', title: '簡文讓 遺產稅', description: '待繳國稅局款項', amount: 0, passedYears: 0, totalYears: 1, icon: 'file-warning', tab: 'personal', isTax: true, bank: '政府稅務', history: [] },
                jianPanGuiYe: { id: 'jianPanGuiYe', title: '簡潘貴葉', description: '已扣除手續費一萬及帳戶管理費三千', amount: 9987000, passedYears: 1, totalYears: 10, icon: 'user', tab: 'institutions', bank: '陽信商業銀行', history: [], cash: 9987000, invested: 0 },
                jianPanGuiYeTax: { id: 'jianPanGuiYeTax', title: '簡潘貴葉 遺產稅', description: '3年期(18期)：首期(24/12/20) 125,060，後每2個月繳 125,044', amount: 2250808, passedYears: 0, totalYears: 3, icon: 'file-warning', tab: 'personal', isTax: true, bank: '政府稅務', history: [] },
                jianQingDianTax: { id: 'jianQingDianTax', title: '簡慶典代墊款', description: '代墊遺產稅款項', amount: 1700000, passedYears: 0, totalYears: 1, icon: 'user-plus', tab: 'personal', bank: '個人與民間借貸', history: [] }
            });

            // 匯出功能
            const exportBackup = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(debts));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "財務備份_" + new Date().toISOString().slice(0,10) + ".json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            // 匯入功能
            const importBackup = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        setDebts(importedData);
                        alert("備份檔匯入成功！");
                    } catch (err) {
                        alert("匯入失敗，請確認檔案格式正確。");
                    }
                };
                reader.readAsText(file);
            };

            const updateItem = (id, field, value) => setDebts(prev => ({...prev, [id]: {...prev[id], [field]: value}}));
            const handleAddRecord = (debtId, record) => {
                setDebts(prev => {
                    const currentDebt = prev[debtId];
                    const deductAmount = record.principal !== undefined ? record.principal : record.amount;
                    let { amount, cash, invested } = currentDebt;
                    if (!record.type || record.type === 'repayment') amount = Math.max(0, amount - deductAmount);
                    else if (record.type === 'invest') { cash = Math.max(0, cash - record.amount); invested = (invested || 0) + record.amount; }
                    else if (record.type === 'interest') cash = (cash || 0) + record.amount;
                    return { ...prev, [debtId]: { ...currentDebt, amount, cash, invested, history: [record, ...(currentDebt.history || [])] } };
                });
            };

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col font-sans">
                    <header className="bg-ms-blue text-white shadow-md">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3"><Icon name="calculator" className="w-6 h-6" /><h1 className="text-xl font-semibold">財務管理主控台</h1></div>
                            <div className="flex gap-2">
                                <button onClick={exportBackup} className="flex items-center gap-1 bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-md text-sm border border-white/20 transition-colors"><Icon name="download" className="w-4 h-4" /> 匯出備份</button>
                                <label className="flex items-center gap-1 bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-md text-sm border border-white/20 transition-colors cursor-pointer">
                                    <Icon name="upload" className="w-4 h-4" /> 匯入備份
                                    <input type="file" onChange={importBackup} className="hidden" accept=".json" />
                                </label>
                            </div>
                        </div>
                    </header>
                    <main className="flex-1 max-w-6xl mx-auto px-6 py-8 w-full">
                        <nav className="flex gap-1 mb-8 bg-ms-bg p-1 rounded-md border border-ms-border w-fit max-w-full">
                            {['summary', 'institutions', 'personal'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded text-sm font-medium ${activeTab === tab ? 'bg-white shadow-sm' : ''}`}>{tab === 'summary' ? '總覽報告' : tab === 'institutions' ? '銀行貸款' : '個人/稅務'}</button>
                            ))}
                        </nav>
                        {activeTab === 'summary' ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in">
                                {Object.entries(debts.reduce((acc, item) => ({...acc, [item.bank]: [...(acc[item.bank] || []), item]}), {})).map(([bank, items]) => (
                                    <div key={bank} className="bg-white p-5 rounded-lg shadow-sm border border-ms-border">
                                        <h3 className="font-semibold mb-3 border-b pb-2">{bank}</h3>
                                        {items.map(item => (
                                            <div key={item.id} className="flex justify-between py-2 text-sm"><span>{item.title}</span><span className="font-bold text-ms-danger">{formatCurrency(item.amount)}</span></div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in">
                                {Object.values(debts).filter(item => item.tab === activeTab).map(item => <DebtCard key={item.id} item={item} updateItem={updateItem} onViewDetails={setSelectedDebtId} />)}
                            </div>
                        )}
                    </main>
                    {selectedDebtId && <DebtDetailModal debt={debts[selectedDebtId]} onClose={() => setSelectedDebtId(null)} onAddRecord={handleAddRecord} onUpdateBalance={updateItem} />}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
